; PlatformIO project for the RP2040 (Raspberry Pi Pico) controls board.
; Uses the Earle Philhower Arduino core for RP2040.

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower

; USB CDC serial to the Pi at 115200 (see docs/serial-protocol.md)
monitor_speed = 115200
build_flags =
    -DSERIAL_BAUD=115200

lib_deps =
    adafruit/Adafruit BusIO
    adafruit/Adafruit PWM Servo Driver Library
    adafruit/Adafruit MPR121
    adafruit/Adafruit MCP23017 Arduino Library
    adafruit/Adafruit TPA2016 Library
    adafruit/Adafruit NeoPixel
    olikraus/U8g2
