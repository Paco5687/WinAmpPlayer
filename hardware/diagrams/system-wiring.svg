<svg viewBox="0 0 1240 900" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <title>WinAmp Physical Edition — system wiring</title>
  <rect width="1240" height="900" fill="#1c1e22"/>

  <!-- title + legend -->
  <text x="40" y="44" fill="#2cff78" font-size="24" font-weight="bold">WINAMP · PHYSICAL EDITION — SYSTEM WIRING</text>
  <g font-size="13">
    <line x1="620" y1="30" x2="660" y2="30" stroke="#ff5c5c" stroke-width="3"/><text x="666" y="34" fill="#d2d6de">5V power</text>
    <line x1="760" y1="30" x2="800" y2="30" stroke="#ffbe3c" stroke-width="3"/><text x="806" y="34" fill="#d2d6de">motor rail</text>
    <line x1="900" y1="30" x2="940" y2="30" stroke="#4cc9f0" stroke-width="3"/><text x="946" y="34" fill="#d2d6de">USB</text>
    <line x1="1000" y1="30" x2="1040" y2="30" stroke="#b06cff" stroke-width="3"/><text x="1046" y="34" fill="#d2d6de">I2C</text>
    <line x1="620" y1="52" x2="660" y2="52" stroke="#5c9dff" stroke-width="3"/><text x="666" y="56" fill="#d2d6de">SPI</text>
    <line x1="760" y1="52" x2="800" y2="52" stroke="#2cff78" stroke-width="3"/><text x="806" y="56" fill="#d2d6de">analog</text>
    <line x1="900" y1="52" x2="940" y2="52" stroke="#8a8f99" stroke-width="3" stroke-dasharray="6 4"/><text x="946" y="56" fill="#d2d6de">GPIO / digital</text>
  </g>

  <!-- ============ POWER (left column) ============ -->
  <rect x="40" y="130" width="170" height="84" rx="8" fill="#26282e" stroke="#ff5c5c"/>
  <text x="125" y="162" fill="#d2d6de" font-size="15" text-anchor="middle" font-weight="bold">4× 18650 Li-ion</text>
  <text x="125" y="184" fill="#8a8f99" font-size="12" text-anchor="middle">~50 Wh · ≈6 h runtime</text>

  <line x1="125" y1="214" x2="125" y2="286" stroke="#ff5c5c" stroke-width="3"/>
  <rect x="105" y="238" width="40" height="16" fill="#1c1e22" stroke="#ff5c5c"/>
  <text x="152" y="251" fill="#8a8f99" font-size="11">fuse + switch</text>

  <rect x="40" y="286" width="170" height="96" rx="8" fill="#26282e" stroke="#ff5c5c"/>
  <text x="125" y="316" fill="#d2d6de" font-size="15" text-anchor="middle" font-weight="bold">Geekworm X728</text>
  <text x="125" y="336" fill="#8a8f99" font-size="12" text-anchor="middle">UPS / BMS / charger</text>
  <text x="125" y="354" fill="#8a8f99" font-size="12" text-anchor="middle">5 V / 5 A out · USB-C in</text>

  <!-- UPS -> Pi USB-C -->
  <path d="M 210 320 H 262 V 322 H 300" fill="none" stroke="#ff5c5c" stroke-width="3"/>
  <text x="222" y="308" fill="#ff5c5c" font-size="12">USB-C 5V/5A</text>

  <!-- UPS -> motor rail -->
  <path d="M 125 382 V 700 H 986" fill="none" stroke="#ffbe3c" stroke-width="3"/>
  <text x="140" y="694" fill="#ffbe3c" font-size="12">motor rail 5 V — 2× 2200 µF bulk caps at the DRV8833s</text>
  <text x="140" y="730" fill="#8a8f99" font-size="12">GND: motor ground and logic ground joined at ONE star point at the UPS</text>

  <!-- ============ Pi 4B (center) ============ -->
  <rect x="300" y="210" width="230" height="200" rx="8" fill="#26282e" stroke="#2cff78" stroke-width="2"/>
  <text x="415" y="244" fill="#2cff78" font-size="18" text-anchor="middle" font-weight="bold">Raspberry Pi 4 B</text>
  <text x="415" y="268" fill="#8a8f99" font-size="12" text-anchor="middle">go-librespot · multi-view UI · kiosk</text>
  <text x="415" y="296" fill="#d2d6de" font-size="12" text-anchor="middle">40-pin GPIO ▲ (all → display)</text>
  <text x="415" y="376" fill="#d2d6de" font-size="12" text-anchor="middle">USB-A ×4 (2 used) ▼</text>

  <!-- HyperPixel above Pi -->
  <rect x="300" y="80" width="230" height="86" rx="8" fill="#26282e" stroke="#ffbe3c" stroke-width="2"/>
  <text x="415" y="112" fill="#ffbe3c" font-size="15" text-anchor="middle" font-weight="bold">HyperPixel 4.0 Square</text>
  <text x="415" y="132" fill="#8a8f99" font-size="12" text-anchor="middle">720×720 DPI touchscreen</text>
  <text x="415" y="150" fill="#8a8f99" font-size="12" text-anchor="middle">⚠ occupies the entire 40-pin header</text>
  <line x1="415" y1="166" x2="415" y2="210" stroke="#8a8f99" stroke-width="6"/>

  <!-- USB DAC path -->
  <path d="M 370 410 V 470" fill="none" stroke="#4cc9f0" stroke-width="3"/>
  <rect x="305" y="470" width="130" height="58" rx="8" fill="#26282e" stroke="#4cc9f0"/>
  <text x="370" y="494" fill="#d2d6de" font-size="14" text-anchor="middle" font-weight="bold">USB DAC</text>
  <text x="370" y="514" fill="#8a8f99" font-size="11" text-anchor="middle">audio out</text>
  <path d="M 435 499 H 470" fill="none" stroke="#2cff78" stroke-width="3"/>
  <circle cx="484" cy="499" r="12" fill="none" stroke="#2cff78" stroke-width="2"/>
  <circle cx="484" cy="499" r="3" fill="#2cff78"/>
  <text x="484" y="479" fill="#8a8f99" font-size="10" text-anchor="middle">switched 3.5 mm</text>
  <path d="M 484 511 V 556" fill="none" stroke="#2cff78" stroke-width="3"/>
  <rect x="404" y="556" width="160" height="58" rx="8" fill="#26282e" stroke="#2cff78"/>
  <text x="484" y="579" fill="#d2d6de" font-size="13" text-anchor="middle" font-weight="bold">TPA2016 amp</text>
  <text x="484" y="597" fill="#8a8f99" font-size="10" text-anchor="middle">2.8 W stereo · I2C on RP2040 bus</text>
  <path d="M 484 614 V 640" fill="none" stroke="#2cff78" stroke-width="3"/>
  <text x="484" y="660" fill="#d2d6de" font-size="12" text-anchor="middle">◁ internal speakers ▷</text>
  <text x="484" y="676" fill="#8a8f99" font-size="10" text-anchor="middle">enclosed stereo pair · jack insert mutes amp</text>

  <!-- USB serial Pi->Pico -->
  <path d="M 470 410 V 440 H 590 V 300 H 640" fill="none" stroke="#4cc9f0" stroke-width="3"/>
  <text x="500" y="432" fill="#4cc9f0" font-size="12">USB CDC serial (ASCII protocol)</text>

  <!-- ============ Pico (right-center) ============ -->
  <rect x="640" y="210" width="190" height="180" rx="8" fill="#26282e" stroke="#2cff78" stroke-width="2"/>
  <text x="735" y="242" fill="#2cff78" font-size="17" text-anchor="middle" font-weight="bold">RP2040 (Pico)</text>
  <text x="735" y="264" fill="#8a8f99" font-size="12" text-anchor="middle">real-time I/O · fader PID</text>
  <text x="735" y="288" fill="#b06cff" font-size="12" text-anchor="middle">I2C0: GP4/GP5</text>
  <text x="735" y="308" fill="#5c9dff" font-size="12" text-anchor="middle">SPI: GP10–14 → OLED</text>
  <text x="735" y="328" fill="#2cff78" font-size="12" text-anchor="middle">ADC0: GP26 ← mux</text>
  <text x="735" y="348" fill="#8a8f99" font-size="12" text-anchor="middle">GP16–21 encoders · GP22 LEDs</text>
  <text x="735" y="368" fill="#8a8f99" font-size="12" text-anchor="middle">GP6–9 mux select</text>

  <!-- OLED above Pico -->
  <rect x="640" y="80" width="190" height="86" rx="8" fill="#26282e" stroke="#5c9dff" stroke-width="2"/>
  <text x="735" y="110" fill="#ffbe3c" font-size="15" text-anchor="middle" font-weight="bold">Amber OLED readout</text>
  <text x="735" y="130" fill="#8a8f99" font-size="12" text-anchor="middle">SSD1322 · 256×64 · SPI</text>
  <text x="735" y="150" fill="#8a8f99" font-size="12" text-anchor="middle">time · title · spectrum (DISP cmds)</text>
  <line x1="735" y1="166" x2="735" y2="210" stroke="#5c9dff" stroke-width="3"/>

  <!-- Mux below Pico -->
  <rect x="640" y="470" width="190" height="86" rx="8" fill="#26282e" stroke="#2cff78"/>
  <text x="735" y="498" fill="#d2d6de" font-size="14" text-anchor="middle" font-weight="bold">CD74HC4067 mux</text>
  <text x="735" y="518" fill="#8a8f99" font-size="11" text-anchor="middle">16-ch analog · S0–S3 = GP6–9</text>
  <text x="735" y="538" fill="#8a8f99" font-size="11" text-anchor="middle">← 10 fader wipers + balance pot</text>
  <path d="M 700 470 V 390" fill="none" stroke="#2cff78" stroke-width="3"/>
  <path d="M 770 470 V 390" fill="none" stroke="#8a8f99" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Encoders + LEDs below mux -->
  <rect x="640" y="586" width="190" height="46" rx="8" fill="#26282e" stroke="#8a8f99"/>
  <text x="735" y="614" fill="#d2d6de" font-size="12" text-anchor="middle">EC11 encoders ×2 → GP16–21</text>
  <path d="M 690 586 V 556 H 660 V 390" fill="none" stroke="#8a8f99" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="640" y="652" width="190" height="42" rx="8" fill="#26282e" stroke="#8a8f99"/>
  <text x="735" y="678" fill="#d2d6de" font-size="12" text-anchor="middle">WS2812 VU/status → GP22</text>

  <!-- ============ I2C bus + expanders (right column) ============ -->
  <path d="M 830 300 H 880 V 640" fill="none" stroke="#b06cff" stroke-width="4"/>
  <text x="893" y="290" fill="#b06cff" font-size="13" font-weight="bold">I2C bus (2 pins, 5 devices incl. TPA2016)</text>

  <rect x="920" y="310" width="160" height="66" rx="8" fill="#26282e" stroke="#b06cff"/>
  <text x="1000" y="336" fill="#d2d6de" font-size="13" text-anchor="middle" font-weight="bold">PCA9685 #1</text>
  <text x="1000" y="356" fill="#8a8f99" font-size="11" text-anchor="middle">16-ch PWM → motors 0–5</text>
  <path d="M 880 343 H 920" fill="none" stroke="#b06cff" stroke-width="3"/>

  <rect x="920" y="396" width="160" height="66" rx="8" fill="#26282e" stroke="#b06cff"/>
  <text x="1000" y="422" fill="#d2d6de" font-size="13" text-anchor="middle" font-weight="bold">PCA9685 #2</text>
  <text x="1000" y="442" fill="#8a8f99" font-size="11" text-anchor="middle">16-ch PWM → motors 6–9</text>
  <path d="M 880 429 H 920" fill="none" stroke="#b06cff" stroke-width="3"/>

  <rect x="920" y="482" width="160" height="60" rx="8" fill="#26282e" stroke="#b06cff"/>
  <text x="1000" y="506" fill="#d2d6de" font-size="13" text-anchor="middle" font-weight="bold">MPR121</text>
  <text x="1000" y="526" fill="#8a8f99" font-size="11" text-anchor="middle">← 10 touch electrodes</text>
  <path d="M 880 512 H 920" fill="none" stroke="#b06cff" stroke-width="3"/>

  <rect x="920" y="562" width="160" height="60" rx="8" fill="#26282e" stroke="#b06cff"/>
  <text x="1000" y="586" fill="#d2d6de" font-size="13" text-anchor="middle" font-weight="bold">MCP23017</text>
  <text x="1000" y="606" fill="#8a8f99" font-size="11" text-anchor="middle">← 13 panel buttons</text>
  <path d="M 880 592 H 920" fill="none" stroke="#b06cff" stroke-width="3"/>

  <!-- DRV8833s + faders far right -->
  <rect x="986" y="660" width="110" height="80" rx="8" fill="#26282e" stroke="#ffbe3c"/>
  <text x="1041" y="686" fill="#d2d6de" font-size="13" text-anchor="middle" font-weight="bold">DRV8833 ×5</text>
  <text x="1041" y="706" fill="#8a8f99" font-size="11" text-anchor="middle">dual H-bridge</text>
  <text x="1041" y="724" fill="#8a8f99" font-size="11" text-anchor="middle">VM ← motor rail</text>
  <path d="M 1000 376 V 400 M 1000 462 V 480" fill="none" stroke="none"/>
  <path d="M 1060 376 Q 1120 500 1085 660" fill="none" stroke="#8a8f99" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M 1060 462 Q 1110 540 1075 660" fill="none" stroke="#8a8f99" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="1108" y="640" fill="#8a8f99" font-size="11">20 PWM lines</text>

  <rect x="986" y="770" width="210" height="70" rx="8" fill="#26282e" stroke="#2cff78" stroke-width="2"/>
  <text x="1091" y="796" fill="#2cff78" font-size="14" text-anchor="middle" font-weight="bold">10 motorized faders</text>
  <text x="1091" y="816" fill="#8a8f99" font-size="11" text-anchor="middle">7 EQ + preamp + volume + seek</text>
  <text x="1091" y="832" fill="#8a8f99" font-size="11" text-anchor="middle">motor · wiper · touch each</text>
  <path d="M 1041 740 V 770" fill="none" stroke="#ffbe3c" stroke-width="3"/>
  <path d="M 1140 770 Q 1180 640 1085 545 Q 900 545 838 540" fill="none" stroke="#2cff78" stroke-width="2" stroke-dasharray="3 5"/>
  <text x="986" y="762" fill="#8a8f99" font-size="10">wipers → mux · touch → MPR121</text>

  <!-- bottom note -->
  <text x="40" y="856" fill="#d2d6de" font-size="13">The HyperPixel takes the whole GPIO header, so ALL control I/O rides USB through the RP2040 — battery telemetry included (X728 I2C is unavailable to the Pi; SoC is read via the RP2040 ADC in the final build).</text>
  <text x="40" y="878" fill="#8a8f99" font-size="12">Pin-level detail: pico-pinout.svg · panel dimensions: front-panel.svg · budget rationale: wiring.md</text>
</svg>
